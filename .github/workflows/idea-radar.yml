name: Idea Radar research

# Расписание ресёрч-прогона Idea Radar.
# Запускает скилл /idea-radar-research (саб-агенты → находки → коммит findings.json в main),
# после чего GitHub Pages пересобирает дашборд автоматически.
#
# АКТИВАЦИЯ (обязательно оба шага):
#   1) Смёржить этот workflow в ветку main — schedule срабатывает только из default-ветки.
#   2) Добавить секрет CLAUDE_CODE_OAUTH_TOKEN
#      (Settings → Secrets and variables → Actions → New repository secret).
#      Токен берётся локально командой `claude setup-token` (нужна подписка Pro/Max).
#      Альтернатива — секрет ANTHROPIC_API_KEY (расход по API-биллингу, см. ниже).
#
# Ручной запуск: вкладка Actions → Idea Radar research → Run workflow (workflow_dispatch).

on:
  schedule:
    # 06:17 UTC по будням (~09:17 МСК). Cron в GitHub Actions всегда в UTC.
    - cron: "17 6 * * 1-5"
  workflow_dispatch: {}

# Не запускать два прогона одновременно (наложение → конфликты при push в main).
concurrency:
  group: idea-radar-research
  cancel-in-progress: false

permissions:
  contents: write   # коммит findings.json в main

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # persist-credentials по умолчанию true → скилл сможет сделать git push origin main.

      - name: Configure git identity
        run: |
          git config user.name "idea-radar-bot"
          git config user.email "idea-radar-bot@users.noreply.github.com"

      - name: Run Idea Radar research
        uses: anthropics/claude-code-action@v1
        with:
          # Токен подписки Claude (claude setup-token). Без расхода по API.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # --- Альтернатива: API-ключ (раскомментируй строку ниже и убери строку выше) ---
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/idea-radar-research"
          claude_args: |
            --max-turns 120
            --model claude-sonnet-4-6
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,WebSearch,WebFetch,Task,TodoWrite"
